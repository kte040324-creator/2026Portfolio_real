<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920" />
  <title>CV — Taeeun Clara Kim</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/cv.css" />
</head>
<body>

  <!-- ============================================
       HEADER / NAV
       ============================================ -->
  <header class="site-header">
    <div class="site-header__email"></div>
    <div class="site-header__year"></div>
  </header>

  <!-- ============================================
       CV PAGE — 1920 × 2005
       ============================================ -->
  <main class="cv-page">

    <!-- Browser tab label -->
    <div class="cv__tab-label"></div>

    <!-- Skills section -->
    <section class="cv__section cv__section--skills" id="skills">
      <div class="cv__section-label"></div>
      <div class="cv__section-content"></div>
    </section>

    <!-- Experiences section -->
    <section class="cv__section cv__section--experiences" id="experiences">
      <div class="cv__section-label"></div>
      <div class="cv__entries">
        <!-- Entry rows populated dynamically -->
      </div>
    </section>

  </main>

  <script src="../js/main.js"></script>
</body>
</html>
