<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taeeun Clara Kim — 정적 미리보기</title>
  <style>
    * { box-sizing: border-box; }
    @font-face {
      font-family: 'FFFAcidGrotesk';
      src: url('./fonts/FFFAcidGroteskVariableTRIALVF.ttf') format('truetype');
      font-weight: 100 900;
      font-display: swap;
    }
    body { margin: 0; background: #f8f8f8; min-height: 100vh; }
    .landing { position: relative; width: 1920px; max-width: 100%; min-height: 1100px; margin: 0 auto; background: #f8f8f8; }
    .landing__email {
      position: absolute;
      left: calc(48.28 / 1920 * 100%);
      top: 28.38px;
      font-family: 'FFFAcidGrotesk', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 520;
      letter-spacing: 0.01em;
      color: #ec5cf0;
      text-decoration: none;
      white-space: nowrap;
    }
    .landing__year {
      position: absolute;
      right: calc(49.904 / 1920 * 100%);
      top: 39.66px;
      font-family: 'FFFAcidGrotesk', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 520;
      letter-spacing: 0.02em;
      color: #ec5cf0;
      white-space: nowrap;
    }
    .landing__folder { position: absolute; left: calc(654 / 1920 * 100%); top: 147px; }
    .landing__folder img { display: block; width: 612px; max-width: 85vw; height: auto; }
  </style>
</head>
<body>
  <div class="landing">
    <a class="landing__email" href="mailto:taeeunclarakim@gmail.com">taeeunclarakim@gmail.com</a>
    <span class="landing__year">@2026</span>
    <div class="landing__folder">
      <img src="./assets/frame-327.svg" alt="Portfolio folder" />
    </div>
  </div>
</body>
</html>
